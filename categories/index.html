      // utterances theme follows the site theme: github-dark in dark mode,

      function utterancesTheme() {
        return document.documentElement.getAttribute('data-theme') === 'dark'
          ? 'github-dark'
          : 'github-light';
      }

      // utteranc.es is GitHub-hosted and slow/unreachable in China. Don't load

      function mountUtterances() {
          var _utterancesBox = document.getElementById('utterances_thread');
          if (!_utterancesBox) return;          // pjax / page.ejs 系页面无容器
          var script = document.createElement('script');
          script.src = 'https://utteranc.es/client.js';
          script.setAttribute('repo', utterances_repo);
          script.setAttribute('issue-term', utterances_issue_term);
          script.setAttribute('label', utterances_label);
          script.setAttribute('theme', utterancesTheme());
          script.setAttribute('crossorigin', 'anonymous');
          script.async = true;
          _utterancesBox.appendChild(script);
      }

      // Live-switch the utterances iframe theme when the site theme changes,
      // without reloading comments. utterances listens for this postMessage.
      function setUtterancesTheme(theme) {
          var box = document.getElementById('utterances_thread');
          if (!box) return;
          var iframe = box.querySelector('iframe');
          if (!iframe || !iframe.contentWindow) return;
          iframe.contentWindow.postMessage({ type: 'set-theme', theme: theme }, 'https://utteranc.es');
      }
      document.addEventListener('theme:changed', function (e) {
          setUtterancesTheme(e.detail && e.detail.theme === 'dark' ? 'github-dark' : 'github-light');
      });

      function initUtterancesLazy() {
          var box = document.getElementById('utterances_thread');
          if (!box) return;

              entries.forEach(function (e) {
                  if (e.isIntersecting) { obs.disconnect(); mountUtterances(); }
              });
